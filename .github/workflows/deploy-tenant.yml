name: Deploy Tenant
on:
  repository_dispatch:
    types: [deploy-tenant]
  workflow_dispatch:
    inputs:
      project_name:
        description: 'CF Pages project name (e.g. og-0ygb0k-uzfw)'
        required: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve project name
        id: config
        run: |
          PROJECT="${{ github.event.client_payload.project_name || github.event.inputs.project_name }}"
          CALLBACK="${{ github.event.client_payload.callback_url || '' }}"
          CALLBACK_SECRET="${{ github.event.client_payload.callback_secret || '' }}"
          echo "project_name=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "callback_url=$CALLBACK" >> "$GITHUB_OUTPUT"
          echo "callback_secret=$CALLBACK_SECRET" >> "$GITHUB_OUTPUT"

      - name: Checkout whitelabel source
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Fetch tenant env vars from CF Pages
        id: env
        run: |
          RESP=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/${{ steps.config.outputs.project_name }}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")

          echo "$RESP" | jq -r '.result.deployment_configs.production.env_vars // {} | to_entries[] | "\(.key)=\(.value.value)"' > .env.production
          echo "Loaded env vars:"
          cat .env.production | sed 's/=.*/=***/'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          set -a
          source .env.production
          set +a
          pnpm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          OUTPUT=$(npx wrangler@latest pages deploy dist/ --project-name=${{ steps.config.outputs.project_name }} --branch=prod 2>&1)
          echo "$OUTPUT"
          # Extract the deployment URL
          PAGES_URL=$(echo "$OUTPUT" | grep -oP 'https://[^ ]+\.pages\.dev' | head -1 || echo "${{ steps.config.outputs.project_name }}.pages.dev")
          echo "pages_url=$PAGES_URL" >> "$GITHUB_OUTPUT"

      - name: Report deploy success
        if: success() && steps.config.outputs.callback_url != ''
        run: |
          curl -s -X POST "${{ steps.config.outputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ steps.config.outputs.callback_secret }}" \
            -d '{
              "project_name": "${{ steps.config.outputs.project_name }}",
              "status": "deployed",
              "pages_url": "${{ steps.deploy.outputs.pages_url }}"
            }'

      - name: Report deploy failure
        if: failure() && steps.config.outputs.callback_url != ''
        run: |
          curl -s -X POST "${{ steps.config.outputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ steps.config.outputs.callback_secret }}" \
            -d '{
              "project_name": "${{ steps.config.outputs.project_name }}",
              "status": "failed",
              "error": "Build or deploy failed — check GitHub Actions logs"
            }'
